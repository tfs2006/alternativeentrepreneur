<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The A.E. Tree | AlternativeEntrepreneur.com</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; overflow: hidden; background-color: #1E293B; /* slate-800 */ }
        #tree-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        .ui-element { position: relative; z-index: 10; }
        .achievement-toast { transition: opacity 0.5s, transform 0.5s; transform: translateY(20px); opacity: 0; }
        .achievement-toast.show { transform: translateY(0); opacity: 1; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #334155; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #64748B; }
        #game-modal, .modal-backdrop { z-index: 100; }
        #game-canvas { background-color: #334155; border-radius: 0.5rem; border: 2px solid #64748B; touch-action: none; }
        .tab-active { background-color: #475569; }
        .power-up-bar { transition: width 0.1s linear; }
        .tree-card.locked { filter: grayscale(1) brightness(0.5); }
        .floating-text { position: absolute; transition: transform 1s ease-out, opacity 1s ease-out; font-size: 1.25rem; font-weight: bold; pointer-events: none; }
    </style>
</head>
<body class="text-white">

    <div id="tree-container"></div>

    <!-- Main UI -->
    <div class="ui-element relative w-full h-screen p-4 md:p-6 flex flex-col pointer-events-none">
        
        <!-- Header -->
        <header class="w-full flex justify-between items-center bg-slate-900/50 backdrop-blur-sm p-4 rounded-xl pointer-events-auto">
            <h1 class="text-2xl md:text-3xl font-bold text-cyan-400">The A.E. Tree</h1>
            <div class="flex items-center space-x-3 md:space-x-4 text-right">
                <div id="prestige-icon-container" class="hidden text-amber-400 text-2xl" title="Prestige Level">★</div>
                <div><p class="text-sm text-slate-400">Level</p><p id="level-display" class="text-lg font-semibold">1</p></div>
                <div><p class="text-sm text-slate-400">XP</p><p id="xp-display" class="text-lg font-semibold">0/100</p></div>
                <div><p class="text-sm text-slate-400">Revenue</p><p id="revenue-display" class="text-lg font-semibold">$0.00</p></div>
                <div><p class="text-sm text-slate-400">Tokens</p><p id="tokens-display" class="text-lg font-semibold text-amber-400">0 TT</p></div>
                <div><p class="text-sm text-slate-400">Player ID</p><p id="player-id-display" class="text-xs font-mono text-slate-500">Connecting...</p></div>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="flex-grow flex flex-col md:flex-row mt-4 md:mt-6 gap-4 md:gap-6 overflow-hidden">
            <div class="w-full md:w-80 lg:w-96 bg-slate-900/50 backdrop-blur-sm p-4 rounded-xl flex flex-col pointer-events-auto">
                <div class="flex-shrink-0">
                    <h2 class="text-xl font-semibold mb-4 border-b border-slate-600 pb-2">Grow Your Tree</h2>
                    <p class="text-sm text-slate-400 mb-4">Play "Keyword Catcher" to earn revenue and tokens. Your progress is saved automatically!</p>
                    <button id="start-challenge-btn" class="w-full bg-cyan-600 hover:bg-cyan-700 text-white font-bold py-3 px-4 rounded-lg transition duration-300 ease-in-out transform hover:scale-105 shadow-lg text-lg">Start Challenge!</button>
                    <button id="prestige-btn" class="hidden w-full bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold py-2 px-4 rounded-lg mt-3">★ Prestige Now!</button>
                </div>
                <div class="mt-6 flex-grow overflow-hidden flex flex-col">
                     <h3 class="text-lg font-semibold mb-2">My Grove</h3>
                     <div id="grove-list" class="space-y-3 overflow-y-auto custom-scrollbar pr-2"></div>
                </div>
            </div>
            <div class="flex-grow"></div>
            <div class="w-full md:w-80 lg:w-96 bg-slate-900/50 backdrop-blur-sm rounded-xl flex flex-col overflow-hidden pointer-events-auto">
                <div class="flex border-b border-slate-600">
                    <button id="achievements-tab" class="tab-button flex-1 p-3 font-semibold text-center tab-active">Achievements</button>
                    <button id="store-tab" class="tab-button flex-1 p-3 font-semibold text-center">Store</button>
                    <button id="events-tab" class="tab-button flex-1 p-3 font-semibold text-center">Events</button>
                </div>
                <div class="flex-grow overflow-y-auto custom-scrollbar p-4">
                    <div id="achievements-content" class="tab-content"><ul id="achievements-list" class="space-y-3"></ul></div>
                    <div id="store-content" class="tab-content hidden"><ul id="store-list" class="space-y-3"></ul></div>
                    <div id="events-content" class="tab-content hidden text-center p-8">
                        <h3 class="text-xl font-semibold text-cyan-400 mb-4">Seasonal Events</h3>
                        <p class="text-slate-400">Coming soon! Check back for special rewards.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="game-modal" class="modal-backdrop hidden ui-element fixed inset-0 bg-black/70 flex items-center justify-center pointer-events-auto">
        <div class="text-center">
            <canvas id="game-canvas" width="800" height="600"></canvas>
            <div id="power-up-timers" class="w-[800px] mx-auto mt-2 space-y-1"></div>
        </div>
    </div>
    <div id="post-game-modal" class="modal-backdrop hidden ui-element fixed inset-0 bg-black/70 flex items-center justify-center pointer-events-auto"></div>
    <div id="daily-reward-modal" class="modal-backdrop hidden ui-element fixed inset-0 bg-black/70 flex items-center justify-center pointer-events-auto"></div>
    <div id="prestige-modal" class="modal-backdrop hidden ui-element fixed inset-0 bg-black/70 flex items-center justify-center pointer-events-auto"></div>
    <div id="achievement-toast-container" class="ui-element fixed bottom-6 right-6 w-80 pointer-events-none"></div>

    <!-- Firebase SDK -->
    <script type="module">
        // --- IMPORTS ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyAJWuyUxt8B2sSzxedG1v1tjXVc",
            authDomain: "auto-blog-275601.firebaseapp.com",
            projectId: "auto-blog-275601",
            storageBucket: "auto-blog-275601.appspot.com",
            messagingSenderId: "634273400730",
            appId: "1:634273400730:web:2f76cb65d1f39cedbd9c23",
            measurementId: "G-DPHGH1ELL3"
        };

        // --- INITIALIZATION ---
        let app, auth, db;
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch (e) {
            console.error("Firebase initialization failed. Please check your firebaseConfig.", e);
            alert("Firebase is not configured correctly. Please check the console for details.");
        }
        
        let userId = null;
        let unsubscribeFromFirestore = null;

        // --- THREE.JS SETUP ---
        let scene, camera, renderer, controls, treeGroup;
        const treeContainer = document.getElementById('tree-container');
        function initThree() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x1E293B, 0.01);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 15, 35);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            treeContainer.appendChild(renderer.domElement);
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.9);
            directionalLight.position.set(10, 20, 15);
            scene.add(directionalLight);
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.minDistance = 10;
            controls.maxDistance = 100;
            controls.maxPolarAngle = Math.PI / 2;
            treeGroup = new THREE.Group();
            scene.add(treeGroup);
            const groundGeometry = new THREE.CircleGeometry(30, 32);
            const groundMaterial = new THREE.MeshLambertMaterial({ color: 0x334155, side: THREE.DoubleSide });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);
            function animate() {
                requestAnimationFrame(animate);
                controls.update();
                renderer.render(scene, camera);
            }
            animate();
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }


        // --- GAME STATE & DATA ---
        let gameState = {};
        const defaultState = {
            xp: 0, level: 1, xpToNextLevel: 100, totalRevenue: 0, salesCount: 0, tokens: 0,
            prestigeLevel: 0, consecutiveDays: 0, lastLogin: '', currentTreeId: 'oak',
            upgrades: { basket: 0, goodChance: 0, powerupTime: 0 },
            achievements: {}
        };

        const treeSpecies = [
            { id: 'oak', name: 'Founder\'s Oak', unlockLevel: 1, trunkColor: 0x966919 },
            { id: 'birch', name: 'Silver Hustle Birch', unlockLevel: 10, trunkColor: 0xFFFFFF },
            { id: 'sakura', name: 'Silicon Sakura', unlockLevel: 25, trunkColor: 0x800020, leafColor: 0xFFC0CB },
            { id: 'crystal', name: 'Crystal Spire', unlockLevel: 50, trunkColor: 0xADD8E6 }
        ];
        
        const storeUpgrades = [
            { id: 'basket', name: 'Wider Basket', d: 'Increases basket width.', l: [1, 1.1, 1.2, 1.3, 1.4], c: [50, 100, 200, 400] },
            { id: 'goodChance', name: 'Better Keywords', d: 'Increases chance of good keywords.', l: [1, 1.1, 1.2, 1.3, 1.4], c: [100, 200, 400, 800] },
            { id: 'powerupTime', name: 'Power-up Duration', d: 'Increases power-up time.', l: [5, 6, 7, 8, 9], c: [75, 150, 300, 600] },
        ];
        
        const achievementsData = [
            { id: 'firstChallenge', name: 'First Challenge', d: 'Complete your first Keyword Catcher challenge.', reward: 25, cond: s => s.salesCount >= 1 },
            { id: 'level5', name: 'Growing Strong', d: 'Reach Level 5.', reward: 50, cond: s => s.level >= 5 },
            { id: 'earn1k', name: 'First Grand', d: 'Earn $1,000 total revenue.', reward: 100, cond: s => s.totalRevenue >= 1000 },
            { id: 'prestige1', name: 'Beyond', d: 'Achieve your first Prestige level.', reward: 1000, cond: s => s.prestigeLevel >= 1},
        ];

        // --- FIREBASE & DATA HANDLING ---
        async function saveData() {
            if (!userId || !db) return;
            try {
                await setDoc(doc(db, "players", userId), gameState);
            } catch (e) {
                console.error("Error saving data: ", e);
            }
        }

        function loadData(data) {
            gameState = { ...defaultState, ...data };
            gameState.upgrades = { ...defaultState.upgrades, ...(data.upgrades || {}) };
            gameState.achievements = { ...defaultState.achievements, ...(data.achievements || {}) };
            rebuildTreeBase();
            updateUI();
            checkDailyReward();
        }
        
        onAuthStateChanged(auth, user => {
            if (user) {
                userId = user.uid;
                document.getElementById('player-id-display').textContent = userId.substring(0, 8);
                if (unsubscribeFromFirestore) unsubscribeFromFirestore();
                unsubscribeFromFirestore = onSnapshot(doc(db, "players", userId), (doc) => {
                    if (doc.exists()) {
                        loadData(doc.data());
                    } else {
                        loadData(defaultState);
                        saveData();
                    }
                });
            } else {
                signInAnonymously(auth).catch(error => console.error("Anonymous sign-in failed:", error));
            }
        });

        // --- UI & RENDER FUNCTIONS ---
        function updateUI() {
            if (!gameState) return;
            const { level, xp, xpToNextLevel, totalRevenue, tokens, prestigeLevel } = gameState;
            document.getElementById('level-display').textContent = level;
            document.getElementById('xp-display').textContent = `${Math.floor(xp)}/${xpToNextLevel}`;
            document.getElementById('revenue-display').textContent = `$${totalRevenue.toFixed(2)}`;
            document.getElementById('tokens-display').textContent = `${tokens} TT`;
            document.getElementById('prestige-btn').classList.toggle('hidden', level < 50);
            const prestigeIcon = document.getElementById('prestige-icon-container');
            prestigeIcon.classList.toggle('hidden', prestigeLevel < 1);
            if (prestigeLevel > 0) prestigeIcon.textContent = '★'.repeat(prestigeLevel);
            renderGrove();
            renderStore();
            renderAchievements();
        }

        function renderGrove() {
            const groveList = document.getElementById('grove-list');
            groveList.innerHTML = '';
            treeSpecies.forEach(species => {
                const isUnlocked = gameState.level >= species.unlockLevel;
                const card = document.createElement('div');
                card.className = `tree-card p-3 bg-slate-800/50 rounded-lg cursor-pointer border-2 ${gameState.currentTreeId === species.id ? 'border-cyan-500' : 'border-transparent'} ${!isUnlocked ? 'locked' : ''}`;
                card.innerHTML = `<p class="font-semibold">${species.name}</p><p class="text-xs text-slate-400">${isUnlocked ? 'Unlocked' : `Unlocks at Level ${species.unlockLevel}`}</p>`;
                if (isUnlocked) {
                    card.onclick = () => {
                        gameState.currentTreeId = species.id;
                        rebuildTreeBase();
                        renderGrove();
                        saveData();
                    };
                }
                groveList.appendChild(card);
            });
        }
        
        function renderStore() {
            const storeList = document.getElementById('store-list');
            storeList.innerHTML = '';
            storeUpgrades.forEach(upgrade => {
                const currentLevel = gameState.upgrades[upgrade.id] || 0;
                const isMaxLevel = currentLevel >= upgrade.c.length;
                const cost = isMaxLevel ? 'MAX' : `${upgrade.c[currentLevel]} TT`;
                const canAfford = !isMaxLevel && gameState.tokens >= upgrade.c[currentLevel];
                const item = document.createElement('li');
                item.className = 'p-3 bg-slate-800/50 rounded-lg';
                item.innerHTML = `<div class="flex justify-between items-center"><div><p class="font-semibold">${upgrade.name} (Lvl ${currentLevel + 1})</p><p class="text-xs text-slate-400">${upgrade.d}</p></div><button class="buy-btn text-sm font-bold py-1 px-3 rounded-md ${isMaxLevel ? 'bg-slate-600 cursor-not-allowed' : canAfford ? 'bg-amber-500 hover:bg-amber-600 text-slate-900' : 'bg-slate-500 cursor-not-allowed'}" ${isMaxLevel || !canAfford ? 'disabled' : ''} data-id="${upgrade.id}">${cost}</button></div>`;
                storeList.appendChild(item);
            });
            document.querySelectorAll('.buy-btn').forEach(btn => btn.onclick = buyUpgrade);
        }
        
        function renderAchievements() {
            const list = document.getElementById('achievements-list');
            list.innerHTML = '';
            achievementsData.forEach(ach => {
                const isUnlocked = gameState.achievements[ach.id];
                const li = document.createElement('li');
                li.className = `p-3 rounded-lg flex items-center gap-4 ${isUnlocked ? 'bg-amber-500/20' : 'bg-slate-800/50'}`;
                li.innerHTML = `<div class="text-2xl">${isUnlocked ? '★' : '☆'}</div><div><p class="font-semibold ${isUnlocked ? 'text-amber-400' : ''}">${ach.name}</p><p class="text-xs text-slate-400">${ach.d}</p></div>`;
                list.appendChild(li);
            });
        }
        
        // --- CORE GAME LOGIC ---
        function processSale(amount) {
            if (isNaN(amount) || amount <= 0) return;
            gameState.totalRevenue += amount;
            gameState.xp += amount;
            gameState.salesCount++;
            const tokenBonus = 1 + (gameState.prestigeLevel * 0.2);
            const earnedTokens = Math.floor((amount / 100) * tokenBonus);
            gameState.tokens += earnedTokens;
            let leveledUp = false;
            while (gameState.xp >= gameState.xpToNextLevel) {
                gameState.level++;
                gameState.xp -= gameState.xpToNextLevel;
                gameState.xpToNextLevel = Math.floor(gameState.xpToNextLevel * 1.2);
                leveledUp = true;
                createLevelUpEffect();
            }
            showPostGameModal(amount, earnedTokens);
            addBranchAndLeaves(amount);
            checkAchievements();
            updateUI();
            saveData();
        }

        function buyUpgrade(e) {
            const upgradeId = e.target.dataset.id;
            const upgrade = storeUpgrades.find(u => u.id === upgradeId);
            const currentLevel = gameState.upgrades[upgradeId] || 0;
            if (upgrade && !(currentLevel >= upgrade.c.length)) {
                const cost = upgrade.c[currentLevel];
                if (gameState.tokens >= cost) {
                    gameState.tokens -= cost;
                    gameState.upgrades[upgradeId]++;
                    updateUI();
                    saveData();
                }
            }
        }
        
        function handlePrestige() {
            if (gameState.level < 50) return;
            gameState.prestigeLevel++;
            gameState.level = 1;
            gameState.xp = 0;
            gameState.xpToNextLevel = 100;
            gameState.tokens += 1000 * gameState.prestigeLevel;
            rebuildTreeBase();
            checkAchievements();
            updateUI();
            saveData();
            document.getElementById('prestige-modal').classList.add('hidden');
        }

        function checkAchievements() {
            achievementsData.forEach(ach => {
                if (!gameState.achievements[ach.id] && ach.cond(gameState)) {
                    gameState.achievements[ach.id] = true;
                    gameState.tokens += ach.reward;
                    showAchievementToast(ach);
                    renderAchievements();
                }
            });
        }

        // --- VISUAL EFFECTS ---
        function createLevelUpEffect() {
            const effectContainer = new THREE.Group();
            const geo = new THREE.SphereGeometry(0.2, 8, 8);
            for(let i = 0; i < 50; i++) {
                const mat = new THREE.MeshBasicMaterial({ color: Math.random() * 0xffffff });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set((Math.random() - 0.5) * 10, 5 + (Math.random() - 0.5) * 10, (Math.random() - 0.5) * 10);
                mesh.userData.velocity = new THREE.Vector3(0, 0.1 + Math.random() * 0.1, 0);
                effectContainer.add(mesh);
            }
            scene.add(effectContainer);
            let life = 0;
            function animateEffect() {
                life++;
                if (life > 60) { scene.remove(effectContainer); return; }
                effectContainer.children.forEach(c => c.position.add(c.userData.velocity));
                requestAnimationFrame(animateEffect);
            }
            animateEffect();
        }

        // --- 3D & MODALS ---
        function rebuildTreeBase() {
            if (!treeGroup || !gameState) return;
            while(treeGroup.children.length > 0){ treeGroup.remove(treeGroup.children[0]); }
            const species = treeSpecies.find(s => s.id === gameState.currentTreeId);
            if (!species) return;
            const trunkGeometry = new THREE.CylinderGeometry(0.5, 1, 10, 8);
            let trunkMaterial = species.id === 'crystal' 
                ? new THREE.MeshPhongMaterial({ color: species.trunkColor, transparent: true, opacity: 0.7, shininess: 90 })
                : new THREE.MeshLambertMaterial({ color: species.trunkColor });
            const trunk = new THREE.Mesh(trunkGeometry, trunkMaterial);
            trunk.position.y = 5;
            treeGroup.add(trunk);
        }

        function addBranchAndLeaves(revenue) {
            if (!treeGroup || !treeGroup.children[0] || !gameState) return;
            const species = treeSpecies.find(s => s.id === gameState.currentTreeId);
            const branchMaterial = treeGroup.children[0].material.clone();
            const branch = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.3, 2 + Math.random() * 4, 6), branchMaterial);
            branch.position.set(Math.cos(Math.random() * Math.PI * 2) * 0.5, 2 + Math.random() * 6, Math.sin(Math.random() * Math.PI * 2) * 0.5);
            branch.rotation.set(Math.random() - 0.5, 0, Math.random() - 0.5);
            treeGroup.add(branch);
            let leafColor = species.leafColor || (revenue > 500 ? 0xfbbf24 : revenue > 250 ? 0x22d3ee : 0x4ade80);
            const leafMaterial = new THREE.MeshLambertMaterial({ color: leafColor });
            for (let i = 0; i < Math.min(20, Math.floor(revenue / 10)); i++) {
                const leaf = new THREE.Mesh(new THREE.SphereGeometry(0.2 + Math.min(0.8, revenue / 200), 6, 6), leafMaterial);
                leaf.position.set((Math.random() - 0.5) * 2, (branch.geometry.parameters.height / 2) * (0.5 + Math.random()), (Math.random() - 0.5) * 2);
                branch.add(leaf);
            }
        }
        
        function showPostGameModal(score, earnedTokens) {
            const modal = document.getElementById('post-game-modal');
            modal.innerHTML = `<div class="bg-slate-800 p-8 rounded-xl shadow-2xl text-center w-96"><h2 class="text-3xl font-bold mb-4">Challenge Complete!</h2><div class="space-y-3 text-lg mb-6"><p>Final Score: <span class="font-bold text-cyan-400">$${score}</span></p><p>Tokens Earned: <span class="font-bold text-amber-400">${earnedTokens} TT</span></p></div><div class="flex gap-4"><button id="back-to-tree-btn" class="flex-1 bg-slate-600 hover:bg-slate-700 text-white font-bold py-2 px-4 rounded-lg">Continue</button></div></div>`;
            modal.classList.remove('hidden');
            document.getElementById('back-to-tree-btn').onclick = () => modal.classList.add('hidden');
        }

        function checkDailyReward() {
            const today = new Date().toISOString().split('T')[0];
            const yesterday = new Date(Date.now() - 864e5).toISOString().split('T')[0];
            if (gameState.lastLogin === today) return;
            if (gameState.lastLogin === yesterday) {
                gameState.consecutiveDays = Math.min(gameState.consecutiveDays + 1, 7);
            } else {
                gameState.consecutiveDays = 1;
            }
            gameState.lastLogin = today;
            const reward = gameState.consecutiveDays * 25;
            gameState.tokens += reward;
            const modal = document.getElementById('daily-reward-modal');
            modal.innerHTML = `<div class="bg-slate-800 p-8 rounded-xl shadow-2xl text-center w-96"><h2 class="text-3xl font-bold mb-2">Daily Login Bonus!</h2><p class="text-slate-400 mb-4">${gameState.consecutiveDays} Day Streak</p><p class="text-4xl font-bold text-amber-400 mb-6">+${reward} TT</p><button id="claim-reward-btn" class="w-full bg-cyan-600 hover:bg-cyan-700 font-bold py-2 px-4 rounded-lg">Awesome!</button></div>`;
            modal.classList.remove('hidden');
            document.getElementById('claim-reward-btn').onclick = () => {
                modal.classList.add('hidden');
                updateUI();
                saveData();
            };
        }
        
        function showPrestigeModal() {
            const modal = document.getElementById('prestige-modal');
            modal.innerHTML = `<div class="bg-slate-800 p-8 rounded-xl shadow-2xl text-center w-96"><h2 class="text-3xl font-bold text-amber-400 mb-2">★ Go Prestige? ★</h2><p class="text-slate-300 mb-4">Reset to Level 1 to earn a permanent <b class="text-white">+20% Token Bonus</b> and <b class="text-white">1,000 bonus tokens</b>. Your upgrades and revenue will be kept.</p><div class="flex gap-4"><button id="cancel-prestige-btn" class="flex-1 bg-slate-600 hover:bg-slate-700 font-bold py-2 px-4 rounded-lg">Not Yet</button><button id="confirm-prestige-btn" class="flex-1 bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold py-2 px-4 rounded-lg">Let's Do It!</button></div></div>`;
            modal.classList.remove('hidden');
            document.getElementById('cancel-prestige-btn').onclick = () => modal.classList.add('hidden');
            document.getElementById('confirm-prestige-btn').onclick = handlePrestige;
        }

        function showAchievementToast(achievement) {
            const toastContainer = document.getElementById('achievement-toast-container');
            const toast = document.createElement('div');
            toast.className = 'achievement-toast bg-amber-500 text-slate-900 p-4 rounded-lg shadow-xl mb-4';
            toast.innerHTML = `<div class="font-bold">Achievement Unlocked!</div><div>${achievement.name} (+${achievement.reward} TT)</div>`;
            toastContainer.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 100);
            setTimeout(() => {
                toast.classList.remove('show');
                toast.addEventListener('transitionend', () => toast.remove());
            }, 5000);
        }

        // --- KEYWORD CATCHER MINI-GAME ---
        const gameModal = document.getElementById('game-modal');
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        let gameActive = false, score, timeLeft, player, gameObjects, timers, scoreMultiplier;
        const keywordTypes = [
            { text: 'SaaS', value: 20, color: '#4ade80', type: 'good' }, { text: 'MRR', value: 50, color: '#facc15', type: 'good' },
            { text: 'Hustle', value: 15, color: '#4ade80', type: 'good' }, { text: 'Debt', value: -25, color: '#f87171', type: 'bad' },
            { text: 'Churn', value: -30, color: '#f87171', type: 'bad' }, { text: 'Equity', value: 40, color: '#4ade80', type: 'good' },
        ];
        const powerUpTypes = [ { id: 'freeze', text: '❄️', color: '#7dd3fc' }, { id: 'magnet', text: '🧲', color: '#f87171' }, { id: 'x2', text: '2x', color: '#facc15' }];

        function runKeywordCatcher() {
            if (!gameState || gameState.upgrades === undefined) {
                console.error("GameState not ready!");
                return;
            }
            gameActive = true;
            score = 0;
            timeLeft = 15;
            gameObjects = [];
            timers = {};
            scoreMultiplier = 1;
            const basketLvl = gameState.upgrades.basket || 0;
            const playerWidth = 120 * storeUpgrades.find(u=>u.id==='basket').l[basketLvl];
            player = { x: canvas.width / 2, y: canvas.height - 50, width: playerWidth, height: 20 };
            gameModal.classList.remove('hidden');
            
            const timerInterval = setInterval(() => {
                if (!gameActive) { clearInterval(timerInterval); return; }
                timeLeft--;
                if (timeLeft <= 0) { clearInterval(timerInterval); endGame(); }
            }, 1000);
            
            const spawnInterval = setInterval(() => spawnObject(spawnInterval), 400);
            gameLoop();
        }

        function endGame() {
            gameActive = false;
            gameModal.classList.add('hidden');
            processSale(score);
        }
        
        function spawnObject(intervalRef) {
            if (!gameActive) { clearInterval(intervalRef); return; }
            const goodChanceLvl = gameState.upgrades.goodChance || 0;
            const goodKeywordChance = 0.7 * storeUpgrades.find(u=>u.id==='goodChance').l[goodChanceLvl];
            const powerUpChance = 0.1;
            let obj;
            const rand = Math.random();
            if (rand < powerUpChance) {
                obj = { ...powerUpTypes[Math.floor(Math.random() * powerUpTypes.length)], isPowerUp: true };
            } else {
                const isGood = Math.random() < goodKeywordChance;
                const available = keywordTypes.filter(k => isGood ? k.type === 'good' : k.type === 'bad');
                obj = { ...available[Math.floor(Math.random() * available.length)], isPowerUp: false };
            }
            ctx.font = '20px Inter';
            const width = ctx.measureText(obj.text).width;
            gameObjects.push({ x: Math.random() * (canvas.width - width), y: -20, speed: 2 + Math.random() * 2, width, height: 20, ...obj });
        }

        function activatePowerUp(powerUp) {
            const powerupTimeLvl = gameState.upgrades.powerupTime || 0;
            const duration = storeUpgrades.find(u=>u.id==='powerupTime').l[powerupTimeLvl];
            timers[powerUp.id] = duration;
            if (powerUp.id === 'x2') scoreMultiplier = 2;
            const timerInterval = setInterval(() => {
                if(!gameActive) { clearInterval(timerInterval); return; }
                timers[powerUp.id]--;
                if (timers[powerUp.id] <= 0) {
                    delete timers[powerUp.id];
                    if (powerUp.id === 'x2') scoreMultiplier = 1;
                    clearInterval(timerInterval);
                }
            }, 1000);
        }

        function gameLoop() {
            if (!gameActive) return;
            const isFrozen = timers['freeze'] > 0;
            const isMagnet = timers['magnet'] > 0;
            gameObjects.forEach((obj, index) => {
                let speed = obj.speed * (isFrozen ? 0.3 : 1);
                if (isMagnet && !obj.isPowerUp && obj.type === 'good') {
                    const dx = (player.x + player.width / 2) - (obj.x + obj.width / 2);
                    const dy = player.y - obj.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    obj.x += (dx / dist) * 3;
                }
                obj.y += speed;
                if (obj.x < player.x + player.width && obj.x + obj.width > player.x && obj.y < player.y + player.height && obj.y + obj.height > player.y) {
                    if (obj.isPowerUp) activatePowerUp(obj);
                    else score += obj.value * scoreMultiplier;
                    gameObjects.splice(index, 1);
                } else if (obj.y > canvas.height) {
                    gameObjects.splice(index, 1);
                }
            });
            draw();
            requestAnimationFrame(gameLoop);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#94A3B8';
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.fillRect(player.x + 10, player.y - 10, player.width - 20, 10);
            gameObjects.forEach(obj => {
                ctx.font = obj.isPowerUp ? '30px Inter' : '20px Inter';
                ctx.fillStyle = obj.color;
                ctx.fillText(obj.text, obj.x, obj.y);
            });
            ctx.fillStyle = 'white';
            ctx.font = '24px Inter';
            ctx.textAlign = 'left';
            ctx.fillText(`Score: $${score}`, 20, 40);
            ctx.textAlign = 'right';
            ctx.fillText(`Time: ${timeLeft}`, canvas.width - 20, 40);
            if(scoreMultiplier > 1) { ctx.textAlign = 'center'; ctx.fillText(`2x ACTIVE!`, canvas.width / 2, 40); }
            const powerUpTimersDiv = document.getElementById('power-up-timers');
            powerUpTimersDiv.innerHTML = '';
            Object.keys(timers).forEach(key => {
                const powerUp = powerUpTypes.find(p => p.id === key);
                const powerupTimeLvl = gameState.upgrades.powerupTime || 0;
                const maxDuration = storeUpgrades.find(u=>u.id==='powerupTime').l[powerupTimeLvl];
                const width = (timers[key] / maxDuration) * 100;
                powerUpTimersDiv.innerHTML += `<div class="w-full bg-slate-600 rounded-full h-2.5"><div class="power-up-bar h-2.5 rounded-full" style="width: ${width}%; background-color: ${powerUp.color};"></div></div>`;
            });
        }
        
        function handleMove(clientX) {
            if (!player) return;
            const rect = canvas.getBoundingClientRect();
            player.x = (clientX - rect.left) - player.width / 2;
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
        }

        // --- EVENT LISTENERS & INITIALIZATION ---
        document.getElementById('start-challenge-btn').addEventListener('click', runKeywordCatcher);
        document.getElementById('prestige-btn').addEventListener('click', showPrestigeModal);
        const gameCanvas = document.getElementById('game-canvas');
        gameCanvas.addEventListener('mousemove', (e) => handleMove(e.clientX));
        gameCanvas.addEventListener('touchmove', (e) => { e.preventDefault(); handleMove(e.touches[0].clientX); });
        
        document.querySelectorAll('.tab-button').forEach(button => {
            button.addEventListener('click', () => {
                document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('tab-active'));
                button.classList.add('tab-active');
                document.querySelectorAll('.tab-content').forEach(content => content.classList.add('hidden'));
                document.getElementById(button.id.replace('-tab', '-content')).classList.remove('hidden');
            });
        });

        window.onload = async () => {
            initThree();
            if (auth) {
                await signInAnonymously(auth);
            }
        };
    </script>
</body>
</html>
