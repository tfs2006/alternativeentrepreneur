<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif">
  <defs>
    <pattern id="g" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M50 0L0 0 0 50" fill="none" stroke="#1a1e2b" stroke-width="0.7"/>
    </pattern>
    <radialGradient id="gl1" cx="38%" cy="55%" r="60%">
      <stop offset="0%" stop-color="#00e07a" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#00e07a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gl2" cx="85%" cy="25%" r="45%">
      <stop offset="0%" stop-color="#7c5cfc" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#7c5cfc" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="topbar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e07a" stop-opacity="0"/>
      <stop offset="25%" stop-color="#00e07a"/>
      <stop offset="75%" stop-color="#7c5cfc"/>
      <stop offset="100%" stop-color="#7c5cfc" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bbar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e07a" stop-opacity="0"/>
      <stop offset="45%" stop-color="#00e07a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#00e07a" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="#0d0f14"/>
  <rect width="1200" height="630" fill="url(#g)"/>
  <rect width="1200" height="630" fill="url(#gl1)"/>
  <rect width="1200" height="630" fill="url(#gl2)"/>
  <!-- Accent bars -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#topbar)"/>
  <rect x="0" y="626" width="1200" height="4" fill="url(#bbar)"/>
  <rect x="0" y="0" width="4" height="630" fill="#00e07a" opacity="0.55"/>

  <!-- BRAND: logo mark + name -->
  <g transform="translate(52, 46)">
    <rect width="54" height="54" rx="11" fill="#141720" stroke="#232840" stroke-width="1.2"/>
    <path d="M13 41 L27 13 L41 41" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <line x1="20" y1="33" x2="34" y2="33" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <circle cx="40.5" cy="40.5" r="5.5" fill="#00e07a"/>
  </g>
  <text x="122" y="68" fill="#ffffff" font-size="20" font-weight="700" letter-spacing="-0.3">Alternative<tspan fill="#00e07a">Entrepreneur</tspan></text>
  <text x="122" y="90" fill="#5c6080" font-size="14">alternativeentrepreneur.com</text>
  <!-- Vertical divider content/visual -->
  <line x1="806" y1="128" x2="806" y2="522" stroke="#232840" stroke-width="1"/>

  <!-- Right: 3 stat cards stacked -->
  <rect x="836" y="148" width="308" height="96" rx="14" fill="#141720" stroke="#232840" stroke-width="1.2"/>
  <rect x="836" y="148" width="4" height="96" rx="2" fill="#00e07a"/>
  <text x="860" y="194" fill="#00e07a" font-size="38" font-weight="900" letter-spacing="-1.5">$50 – $200</text>
  <text x="860" y="224" fill="#8b90a7" font-size="14">CPA per conversion · top programs</text>

  <rect x="836" y="260" width="308" height="96" rx="14" fill="#141720" stroke="#232840" stroke-width="1.2"/>
  <rect x="836" y="260" width="4" height="96" rx="2" fill="#7c5cfc"/>
  <text x="860" y="306" fill="#7c5cfc" font-size="38" font-weight="900" letter-spacing="-1.5">79 k+</text>
  <text x="860" y="336" fill="#8b90a7" font-size="14">Monthly searches targeted</text>

  <rect x="836" y="372" width="308" height="96" rx="14" fill="#141720" stroke="#232840" stroke-width="1.2"/>
  <rect x="836" y="372" width="4" height="96" rx="2" fill="#5ba0ff"/>
  <text x="860" y="418" fill="#5ba0ff" font-size="38" font-weight="900" letter-spacing="-1.5">34+</text>
  <text x="860" y="448" fill="#8b90a7" font-size="14">Keyword opportunities covered</text>

  <!-- EYEBROW BADGE -->
  <g transform="translate(52, 138)">
    <rect width="276" height="32" rx="16" fill="rgba(0,224,122,0.09)" stroke="rgba(0,224,122,0.28)" stroke-width="1"/>
    <circle cx="20" cy="16" r="5" fill="#00e07a"/>
    <text x="36" y="21.5" fill="#00e07a" font-size="12" font-weight="700" letter-spacing="0.12em">MAKE MONEY ONLINE · 2026</text>
  </g>

  <!-- MAIN HEADLINE -->
  <text x="52" y="265" fill="#ffffff" font-size="88" font-weight="900" letter-spacing="-3.5">The Alternative</text>
  <text x="52" y="362" fill="#00e07a" font-size="88" font-weight="900" letter-spacing="-3.5">Way to Earn</text>

  <!-- TAGLINE -->
  <text x="52" y="420" fill="#8b90a7" font-size="21" letter-spacing="-0.2">Real AI workflows · Affiliate marketing · Honest tool reviews</text>

  <!-- DIVIDER -->
  <line x1="52" y1="448" x2="756" y2="448" stroke="#1a1e2b" stroke-width="1.2"/>

  <!-- PILLS -->
  <g transform="translate(52, 466)">
    <rect width="190" height="34" rx="17" fill="rgba(0,224,122,0.08)" stroke="rgba(0,224,122,0.22)" stroke-width="1"/>
    <text x="95" y="22.5" fill="#00e07a" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="0.07em">AFFILIATE MARKETING</text>
  </g>
  <g transform="translate(256, 466)">
    <rect width="122" height="34" rx="17" fill="rgba(124,92,252,0.08)" stroke="rgba(124,92,252,0.22)" stroke-width="1"/>
    <text x="61" y="22.5" fill="#7c5cfc" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="0.07em">AI TOOLS</text>
  </g>
  <g transform="translate(392, 466)">
    <rect width="148" height="34" rx="17" fill="rgba(91,160,255,0.08)" stroke="rgba(91,160,255,0.22)" stroke-width="1"/>
    <text x="74" y="22.5" fill="#5ba0ff" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="0.07em">BUILD WITH AI</text>
  </g>
  <g transform="translate(554, 466)">
    <rect width="118" height="34" rx="17" fill="rgba(255,157,74,0.08)" stroke="rgba(255,157,74,0.22)" stroke-width="1"/>
    <text x="59" y="22.5" fill="#ff9d4a" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="0.07em">WORKFLOWS</text>
