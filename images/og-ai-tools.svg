    <text x="160" y="438" fill="#5c6080" font-size="11" text-anchor="middle" letter-spacing="0.06em">OPTIMIZE</text>
    <text x="280" y="438" fill="#5c6080" font-size="11" text-anchor="middle" letter-spacing="0.06em">OUTPUT</text>
