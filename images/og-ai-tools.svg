  <g transform="translate(52, 138)">
    <rect width="216" height="32" rx="16" fill="rgba(124,92,252,0.10)" stroke="rgba(124,92,252,0.30)" stroke-width="1"/>
    <circle cx="20" cy="16" r="5" fill="#7c5cfc"/>
    <text x="36" y="21.5" fill="#7c5cfc" font-size="12" font-weight="700" letter-spacing="0.12em">AI TOOLS REVIEWED · 2026</text>
  </g>

  <!-- MAIN HEADLINE -->
  <text x="52" y="265" fill="#ffffff" font-size="88" font-weight="900" letter-spacing="-3.5">The AI Tools</text>
  <text x="52" y="362" fill="#7c5cfc" font-size="88" font-weight="900" letter-spacing="-3.5">That Pay Off</text>

  <!-- TAGLINE -->
  <text x="52" y="418" fill="#8b90a7" font-size="21" letter-spacing="-0.2">Claude · ChatGPT · Suno · Sora — tested, ranked, field-proven</text>

  <line x1="52" y1="446" x2="756" y2="446" stroke="#1a1e2b" stroke-width="1.2"/>

  <!-- PILLS -->
  <g transform="translate(52, 464)">
    <rect width="118" height="34" rx="17" fill="rgba(124,92,252,0.08)" stroke="rgba(124,92,252,0.22)" stroke-width="1"/>
    <text x="59" y="22.5" fill="#7c5cfc" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="0.07em">REVIEWED</text>
  </g>
  <g transform="translate(184, 464)">
    <rect width="104" height="34" rx="17" fill="rgba(124,92,252,0.08)" stroke="rgba(124,92,252,0.22)" stroke-width="1"/>
    <text x="52" y="22.5" fill="#7c5cfc" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="0.07em">RANKED</text>
  </g>
  <g transform="translate(302, 464)">
    <rect width="174" height="34" rx="17" fill="rgba(124,92,252,0.08)" stroke="rgba(124,92,252,0.22)" stroke-width="1"/>
    <text x="87" y="22.5" fill="#7c5cfc" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="0.07em">UPDATED 2026</text>
  </g>
  <g transform="translate(490, 464)">
    <rect width="146" height="34" rx="17" fill="rgba(0,224,122,0.08)" stroke="rgba(0,224,122,0.22)" stroke-width="1"/>
    <text x="73" y="22.5" fill="#00e07a" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="0.07em">FREE GUIDES</text>
  </g>
</svg>