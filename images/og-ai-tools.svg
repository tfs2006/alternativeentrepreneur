    <!-- Input layer to hidden layer -->
    <line x1="40" y1="90"  x2="160" y2="60"  stroke="#7c5cfc" stroke-width="1" opacity="0.25"/>
    <line x1="40" y1="90"  x2="160" y2="140" stroke="#7c5cfc" stroke-width="1" opacity="0.25"/>
    <line x1="40" y1="90"  x2="160" y2="220" stroke="#7c5cfc" stroke-width="1" opacity="0.15"/>
    <line x1="40" y1="185" x2="160" y2="60"  stroke="#7c5cfc" stroke-width="1" opacity="0.15"/>
    <line x1="40" y1="185" x2="160" y2="140" stroke="#7c5cfc" stroke-width="1.5" opacity="0.35"/>
    <line x1="40" y1="185" x2="160" y2="220" stroke="#7c5cfc" stroke-width="1.5" opacity="0.35"/>
    <line x1="40" y1="280" x2="160" y2="140" stroke="#7c5cfc" stroke-width="1" opacity="0.2"/>
    <line x1="40" y1="280" x2="160" y2="220" stroke="#7c5cfc" stroke-width="1.5" opacity="0.4"/>
