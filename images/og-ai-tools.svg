    <text x="280" y="150" fill="#00e07a" font-size="10" font-weight="700" text-anchor="middle">+CASH</text>
    <circle cx="280" cy="260" r="28" fill="#1a1e2b" stroke="#5ba0ff" stroke-width="2.5"/>
    <text x="280" y="256" fill="#5ba0ff" font-size="10" font-weight="700" text-anchor="middle">AUTO</text>
    <text x="280" y="270" fill="#5ba0ff" font-size="10" font-weight="700" text-anchor="middle">SCALE</text>
