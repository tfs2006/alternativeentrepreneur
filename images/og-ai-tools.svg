    <line x1="160" y1="140" x2="280" y2="140" stroke="#5ba0ff" stroke-width="2" opacity="0.5"/>
    <line x1="160" y1="140" x2="280" y2="260" stroke="#5ba0ff" stroke-width="1" opacity="0.2"/>
    <line x1="160" y1="220" x2="280" y2="140" stroke="#00e07a" stroke-width="2" opacity="0.5"/>
