<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif">
  <defs>
    <pattern id="g" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M50 0L0 0 0 50" fill="none" stroke="#1a1e2b" stroke-width="0.7"/>
    </pattern>
    <radialGradient id="gl1" cx="40%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#00e07a" stop-opacity="0.11"/>
      <stop offset="100%" stop-color="#00e07a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gl2" cx="85%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#7c5cfc" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#7c5cfc" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="topbar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e07a" stop-opacity="0"/>
      <stop offset="25%" stop-color="#00e07a"/>
      <stop offset="75%" stop-color="#7c5cfc"/>
      <stop offset="100%" stop-color="#7c5cfc" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bbar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e07a" stop-opacity="0"/>
      <stop offset="45%" stop-color="#00e07a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00e07a" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="#0d0f14"/>
  <rect width="1200" height="630" fill="url(#g)"/>
  <rect width="1200" height="630" fill="url(#gl1)"/>
  <rect width="1200" height="630" fill="url(#gl2)"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#topbar)"/>
  <rect x="0" y="626" width="1200" height="4" fill="url(#bbar)"/>
  <rect x="0" y="0" width="4" height="630" fill="#00e07a" opacity="0.55"/>

  <!-- BRAND: logo mark + name -->
  <g transform="translate(52, 46)">
    <rect width="54" height="54" rx="11" fill="#141720" stroke="#232840" stroke-width="1.2"/>
    <path d="M13 41 L27 13 L41 41" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <line x1="20" y1="33" x2="34" y2="33" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <circle cx="40.5" cy="40.5" r="5.5" fill="#00e07a"/>
  </g>
  <text x="122" y="68" fill="#ffffff" font-size="20" font-weight="700" letter-spacing="-0.3">Alternative<tspan fill="#00e07a">Entrepreneur</tspan></text>
  <text x="122" y="90" fill="#5c6080" font-size="14">alternativeentrepreneur.com</text>
  <!-- Vertical divider content/visual -->
  <line x1="806" y1="128" x2="806" y2="522" stroke="#232840" stroke-width="1"/>

  <!-- Right: giant watermark A -->
  <g transform="translate(810, 55)" opacity="0.05">
    <path d="M185 530 L370 40 L555 530" stroke="#00e07a" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <line x1="252" y1="385" x2="488" y2="385" stroke="#00e07a" stroke-width="36" stroke-linecap="round"/>
  </g>
  <!-- Glowing orb -->
  <ellipse cx="1050" cy="315" rx="240" ry="210" fill="#00e07a" opacity="0.025"/>

  <!-- Right: 4 topic pills stacked -->
  <g transform="translate(836, 192)">
    <rect width="296" height="48" rx="12" fill="#141720" stroke="#232840" stroke-width="1.2"/>
    <rect width="4" height="48" rx="2" fill="#00e07a"/>
    <text x="22" y="30" fill="#ffffff" font-size="16" font-weight="700">Affiliate Marketing</text>
    <text x="22" y="46" fill="#5c6080" font-size="12">High-ticket · No audience needed</text>
  </g>
  <g transform="translate(836, 254)">
    <rect width="296" height="48" rx="12" fill="#141720" stroke="#232840" stroke-width="1.2"/>
    <rect width="4" height="48" rx="2" fill="#7c5cfc"/>
    <text x="22" y="30" fill="#ffffff" font-size="16" font-weight="700">AI Tools</text>
    <text x="22" y="46" fill="#5c6080" font-size="12">Claude · ChatGPT · Suno · Sora</text>
  </g>
  <g transform="translate(836, 316)">
    <rect width="296" height="48" rx="12" fill="#141720" stroke="#232840" stroke-width="1.2"/>
    <rect width="4" height="48" rx="2" fill="#5ba0ff"/>
    <text x="22" y="30" fill="#ffffff" font-size="16" font-weight="700">Build With AI</text>
    <text x="22" y="46" fill="#5c6080" font-size="12">Next.js · Vercel · Prog SEO</text>
  </g>
  <g transform="translate(836, 378)">
    <rect width="296" height="48" rx="12" fill="#141720" stroke="#232840" stroke-width="1.2"/>
    <rect width="4" height="48" rx="2" fill="#ff9d4a"/>
    <text x="22" y="30" fill="#ffffff" font-size="16" font-weight="700">Workflows</text>
    <text x="22" y="46" fill="#5c6080" font-size="12">Real systems · Automation · AI</text>
  </g>

  <!-- EYEBROW BADGE -->
  <g transform="translate(52, 138)">
    <rect width="292" height="32" rx="16" fill="rgba(0,224,122,0.09)" stroke="rgba(0,224,122,0.28)" stroke-width="1"/>
    <circle cx="20" cy="16" r="5" fill="#00e07a"/>
    <text x="36" y="21.5" fill="#00e07a" font-size="12" font-weight="700" letter-spacing="0.12em">MAKE MONEY ONLINE WITH AI · 2026</text>
  </g>

  <!-- MAIN HEADLINE — two lines -->
  <text x="52" y="272" fill="#ffffff" font-size="96" font-weight="900" letter-spacing="-4">Alternative</text>
  <text x="52" y="374" fill="#00e07a" font-size="96" font-weight="900" letter-spacing="-4">Entrepreneur</text>

  <!-- TAGLINE -->
  <text x="52" y="426" fill="#8b90a7" font-size="21" letter-spacing="-0.2">Real workflows. No gurus. Just results.</text>

  <line x1="52" y1="454" x2="780" y2="454" stroke="#1a1e2b" stroke-width="1.2"/>

  <!-- Bottom domain pill -->
  <g transform="translate(52, 472)">
    <rect width="318" height="34" rx="17" fill="rgba(0,224,122,0.07)" stroke="rgba(0,224,122,0.18)" stroke-width="1"/>
    <text x="159" y="22.5" fill="#00e07a" font-size="13" font-weight="700" text-anchor="middle" letter-spacing="0.08em">alternativeentrepreneur.com</text>
  </g>
</svg>