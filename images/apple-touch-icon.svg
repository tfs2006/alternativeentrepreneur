<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <!-- Background -->
  <rect width="180" height="180" rx="40" fill="#0d0f14"/>
  <!-- Subtle radial glow -->
  <radialGradient id="glow" cx="50%" cy="40%" r="60%">
    <stop offset="0%" stop-color="#00e07a" stop-opacity="0.10"/>
    <stop offset="100%" stop-color="#00e07a" stop-opacity="0"/>
  </radialGradient>
  <rect width="180" height="180" rx="40" fill="url(#glow)"/>
  <!-- "A" letterform -->
  <path d="M38 142 L90 38 L142 142" stroke="#ffffff" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <line x1="62" y1="110" x2="118" y2="110" stroke="#ffffff" stroke-width="13" stroke-linecap="round"/>
  <!-- Green accent dot -->
  <circle cx="141" cy="141" r="19" fill="#00e07a"/>
</svg>
