    <text x="74" y="22.5" fill="#7c5cfc" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="0.07em">PROG SEO</text>
  </g>
  <g transform="translate(584, 460)">
    <rect width="116" height="34" rx="17" fill="rgba(255,157,74,0.08)" stroke="rgba(255,157,74,0.22)" stroke-width="1"/>
    <text x="58" y="22.5" fill="#ff9d4a" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="0.07em">FREE GUIDE</text>
