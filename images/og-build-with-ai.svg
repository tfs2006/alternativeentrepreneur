  <circle cx="870" cy="144" r="6.5" fill="#ffbd2e"/>
  <circle cx="890" cy="144" r="6.5" fill="#28c840"/>
  <text x="994" y="149" fill="#5c6080" font-size="12" text-anchor="middle">~/affiliate-site</text>
