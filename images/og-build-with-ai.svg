  <text x="848" y="212" fill="#5c6080" font-size="13" font-family="'Courier New',Courier,monospace">$</text>
  <text x="862" y="212" fill="#00e07a" font-size="13" font-family="'Courier New',Courier,monospace">ai-content generate</text>
  <text x="862" y="228" fill="#8b90a7" font-size="11" font-family="'Courier New',Courier,monospace">  ✓ 50 pages created in 4.2s</text>
  <text x="848" y="252" fill="#5c6080" font-size="13" font-family="'Courier New',Courier,monospace">$</text>
  <text x="862" y="252" fill="#7c5cfc" font-size="13" font-family="'Courier New',Courier,monospace">vercel deploy --prod</text>
  <text x="862" y="268" fill="#8b90a7" font-size="11" font-family="'Courier New',Courier,monospace">  ✓ Live in 34s</text>
  <text x="848" y="292" fill="#5c6080" font-size="13" font-family="'Courier New',Courier,monospace">$</text>
  <text x="862" y="292" fill="#ff9d4a" font-size="13" font-family="'Courier New',Courier,monospace">seo rank-track --site</text>
  <text x="862" y="308" fill="#8b90a7" font-size="11" font-family="'Courier New',Courier,monospace">  ✓ 12 keywords page 1</text>
