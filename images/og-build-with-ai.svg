    <text x="52" y="22.5" fill="#5ba0ff" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="0.07em">VERCEL</text>
  </g>
  <g transform="translate(290, 460)">
    <rect width="118" height="34" rx="17" fill="rgba(0,224,122,0.08)" stroke="rgba(0,224,122,0.22)" stroke-width="1"/>
    <text x="59" y="22.5" fill="#00e07a" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="0.07em">AI CONTENT</text>
