  <text x="916" y="376" fill="#5ba0ff" font-size="12" font-weight="700">Next.js</text>
  <text x="968" y="376" fill="#8b90a7" font-size="12">·</text>
  <text x="983" y="376" fill="#7c5cfc" font-size="12" font-weight="700">Vercel</text>
  <text x="1030" y="376" fill="#8b90a7" font-size="12">·</text>
  <text x="1042" y="376" fill="#00e07a" font-size="12" font-weight="700">AI SEO</text>
